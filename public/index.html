<!DOCTYPE html>
<html lang="sv">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Andvo Edu — AI Lektionsgenerator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Playfair+Display:wght@700&display=swap');
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{
    --bg:#0a0c12;--surface:#13151f;--surface2:#1c1f2e;
    --border:#252840;--accent:#6c8fff;--green:#4ade80;
    --yellow:#fbbf24;--red:#f87171;--text:#eef0f8;--muted:#6b7094;
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}

  /* ── SETUP ── */
  #setup{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;gap:16px;}
  .logo{font-family:'Playfair Display',serif;font-size:2rem;}
  .logo span{color:var(--accent);}
  .tagline{color:var(--muted);font-size:.85rem;text-align:center;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;width:100%;max-width:500px;display:flex;flex-direction:column;gap:14px;}
  label{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;}
  input,select{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Inter',sans-serif;font-size:14px;padding:11px 13px;outline:none;transition:border .2s;}
  input:focus,select:focus{border-color:var(--accent);}
  select option{background:var(--surface);}
  .lvl-grid{display:flex;justify-content:center;gap:18px;padding:6px 0;}
  .lvl-circle{width:38px;height:38px;border-radius:50%;border:none;cursor:pointer;transition:box-shadow .2s,transform .2s;}
  .lvl-circle.lvl-basic{background:var(--green);}
  .lvl-circle.lvl-medium{background:var(--accent);}
  .lvl-circle.lvl-advanced{background:#a78bfa;}
  .lvl-circle.selected{box-shadow:0 0 0 3px #fff;transform:scale(1.1);}
  .genbtn{width:100%;padding:13px;background:var(--accent);border:none;border-radius:9px;color:white;font-family:'Inter',sans-serif;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .2s;}
  .genbtn:hover{opacity:.88;}
  .genbtn:disabled{opacity:.5;cursor:default;}

  /* ── LOADING ── */
  #loading{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px;}
  .spinner{width:44px;height:44px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
  @keyframes spin{to{transform:rotate(360deg)}}
  .load-steps{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
  .lstep{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted);transition:color .3s;}
  .lstep.active{color:var(--accent);}
  .lstep.done{color:var(--green);}
  .lstep-dot{width:8px;height:8px;border-radius:50%;background:var(--border);flex-shrink:0;transition:background .3s;}
  .lstep.active .lstep-dot{background:var(--accent);}
  .lstep.done .lstep-dot{background:var(--green);}

  /* ── EDITOR ── */
  #editor{display:none;flex-direction:column;min-height:100vh;}
  .editor-header{background:var(--surface);border-bottom:1px solid var(--border);padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;position:sticky;top:0;z-index:10;}
  .lesson-title{font-family:'Playfair Display',serif;font-size:1.1rem;}
  .lesson-meta{font-size:12px;color:var(--muted);}
  .hbtn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:12px;padding:6px 12px;cursor:pointer;transition:all .2s;}
  .hbtn:hover{border-color:var(--accent);color:var(--accent);}
  .hbtn.pr{background:var(--accent);border-color:var(--accent);color:white;font-weight:500;}

  .editor-body{display:flex;flex:1;}

  /* Sidebar */
  .sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:16px 0;flex-shrink:0;overflow-y:auto;max-height:calc(100vh - 53px);position:sticky;top:53px;}
  .sb-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);padding:0 14px;margin-bottom:10px;}
  .sb-item{padding:9px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);}
  .sb-item:hover{background:var(--surface2);color:var(--text);}
  .sb-item.active{border-left-color:var(--accent);background:var(--surface2);color:var(--text);}
  .sb-item.hidden-block{opacity:.4;}
  .type-icon{width:22px;height:22px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;}
  .tl{background:rgba(108,143,255,.15);}
  .tt{background:rgba(251,191,36,.15);}
  .tv{background:rgba(74,222,128,.15);}
  .ts{background:rgba(167,139,250,.15);}

  /* Main content */
  .main{flex:1;padding:28px;overflow-y:auto;max-width:800px;}
  .block-header{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap;}
  .badge{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;padding:3px 10px;border-radius:6px;}
  .bl{background:rgba(108,143,255,.15);color:var(--accent);}
  .bt{background:rgba(251,191,36,.15);color:var(--yellow);}
  .bv{background:rgba(74,222,128,.15);color:var(--green);}
  .bs{background:rgba(167,139,250,.15);color:#a78bfa;}
  .block-title{font-family:'Playfair Display',serif;font-size:1.5rem;margin-bottom:16px;}
  .block-lead{font-size:14px;color:var(--accent);font-style:italic;margin-bottom:14px;line-height:1.6;}
  .hbox{background:var(--surface2);border-left:3px solid var(--accent);border-radius:0 8px 8px 0;padding:12px 16px;margin:12px 0;font-size:13px;line-height:1.7;}
  .bcontent{font-size:14px;line-height:1.82;color:#b8bcd4;}
  .bcontent p{margin-bottom:10px;}
  .tbox{background:rgba(251,191,36,.05);border:1px solid rgba(251,191,36,.2);border-radius:11px;padding:18px;margin-top:14px;}
  .tbox h4{color:var(--yellow);font-size:11px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:9px;}
  .tinput{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:10px;resize:vertical;min-height:70px;outline:none;margin-top:8px;}
  .tinput:focus{border-color:var(--yellow);}
  .vbox{background:var(--surface2);border:2px dashed var(--border);border-radius:11px;padding:28px;text-align:center;margin-top:14px;}
  .vbox p{color:var(--muted);font-size:13px;margin:6px 0;}
  .sbox{background:rgba(167,139,250,.05);border:1px solid rgba(167,139,250,.25);border-radius:11px;padding:18px;margin-top:14px;}
  .sbox h4{color:#a78bfa;font-size:11px;text-transform:uppercase;letter-spacing:.07em;margin-bottom:10px;}

  /* Block actions */
  .block-actions{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;}
  .abtn{background:none;border:1px solid var(--border);border-radius:7px;color:var(--muted);font-family:'Inter',sans-serif;font-size:12px;padding:5px 12px;cursor:pointer;transition:all .2s;}
  .abtn:hover{border-color:var(--accent);color:var(--accent);}
  .abtn.danger:hover{border-color:var(--red);color:var(--red);}
  .abtn.warn:hover{border-color:var(--yellow);color:var(--yellow);}

  /* AI rewrite */
  .ai-rewrite{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px;margin-top:16px;}
  .ai-rewrite-label{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:500;}
  .ai-row{display:flex;gap:8px;}
  .ai-input{flex:1;background:var(--bg);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Inter',sans-serif;font-size:13px;padding:8px 11px;outline:none;}
  .ai-input:focus{border-color:var(--accent);}
  .ai-btn{background:var(--accent);border:none;border-radius:7px;color:white;font-family:'Inter',sans-serif;font-size:13px;padding:8px 14px;cursor:pointer;white-space:nowrap;}

  /* YouTube save */
  .yt-row{display:flex;gap:8px;margin-top:10px;}

  /* YouTube-inbäddning, videoförslag och undertextval */
  .yt-embed-wrap{position:relative;width:100%;padding-top:56.25%;border-radius:8px;overflow:hidden;background:#000;}
  .yt-embed-wrap iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:0;}
  .yt-sub-row{display:flex;align-items:center;gap:10px;margin-top:10px;flex-wrap:wrap;}
  .yt-sub-note{width:100%;font-size:11px;color:var(--yellow);margin-top:6px;text-align:left;}
  .yt-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:10px;margin:12px 0;text-align:left;}
  .yt-card{cursor:pointer;border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--bg);transition:border-color .2s;}
  .yt-card:hover{border-color:var(--accent);}
  .yt-card img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;}
  .yt-card-title{font-size:11px;padding:6px 8px 2px;color:var(--text);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .yt-card-meta{font-size:10px;color:var(--muted);padding:0 8px 8px;}
  .yt-search-row{display:flex;gap:8px;margin-top:4px;}

  /* Check results */
  .check-bar{padding:8px 16px;font-size:12px;display:flex;align-items:center;gap:8px;}
  .check-ok{background:rgba(74,222,128,.08);border-bottom:1px solid rgba(74,222,128,.2);color:var(--green);}
  .check-warn{background:rgba(251,191,36,.08);border-bottom:1px solid rgba(251,191,36,.2);color:var(--yellow);}
  .check-err{background:rgba(248,113,113,.08);border-bottom:1px solid rgba(248,113,113,.2);color:var(--red);}

  /* Nav */
  .block-nav{display:flex;gap:10px;margin-top:24px;padding-top:20px;border-top:1px solid var(--border);}
  .nbtn{padding:9px 18px;border-radius:8px;border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;transition:all .2s;}
  .nbtn:hover{border-color:var(--accent);color:var(--accent);}
  .nbtn.pr{background:var(--accent);border-color:var(--accent);color:white;font-weight:500;margin-left:auto;}

  .error-box{background:rgba(248,113,113,.1);border:1px solid rgba(248,113,113,.3);border-radius:8px;padding:12px 16px;color:var(--red);font-size:13px;margin-top:12px;display:none;}

  /* ── TTS (Web Speech API) ── */
  .tts-bar{display:flex;align-items:center;gap:10px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:10px;flex-wrap:wrap;}
  .tts-btn{background:var(--accent);border:none;width:32px;height:32px;border-radius:50%;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:opacity .2s;flex-shrink:0;}
  .tts-btn:hover{opacity:.85;}
  .tts-btn.stop{background:var(--bg);border:1px solid var(--border);color:var(--muted);}
  .tts-label{font-size:11px;color:var(--muted);white-space:nowrap;}
  .tts-select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;font-family:'Inter',sans-serif;font-size:12px;padding:5px 8px;max-width:220px;}
  .tts-range{width:90px;accent-color:var(--accent);}
  .tts-details{margin-bottom:14px;}
  .tts-details summary{cursor:pointer;font-size:12px;color:var(--muted);padding:4px 0;user-select:none;}
  .tts-transcript{font-size:13px;line-height:1.9;color:#b8bcd4;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-top:6px;max-height:220px;overflow-y:auto;}
  .tw{transition:background .15s,color .15s;border-radius:3px;padding:0 1px;}
  .tw.tts-highlight{background:rgba(108,143,255,.4);color:#fff;}

  /* ── Bilder (Google-bildsökning + Claude Vision + DALL-E-reserv, laddas progressivt) ── */
  .img-credit{position:absolute;bottom:0;right:0;background:rgba(0,0,0,.6);color:#fff;font-size:10px;padding:3px 9px;border-radius:8px 0 0 0;}
  .img-credit a{color:#fff;}
  .img-skeleton{width:100%;height:180px;background:var(--surface2);animation:pulseGrey 1.6s ease-in-out infinite;}
  @keyframes pulseGrey{0%,100%{opacity:.55}50%{opacity:1}}
  .scene-media img.img-fade-in{animation:imgFadeIn .4s ease;}
  @keyframes imgFadeIn{from{opacity:0}to{opacity:1}}
  .scene-img-controls{display:flex;gap:6px;flex-wrap:wrap;padding:8px 10px;background:var(--surface2);}
  .scene-img-controls .abtn{font-size:11px;padding:4px 9px;}
  .scene-img-paste{display:flex;gap:6px;flex:1;min-width:200px;}
  .scene-img-paste input{min-height:auto;padding:6px 9px;font-size:12px;}

  /* ── Bildladdningsindikator (progressiv laddning i bakgrunden) ── */
  .img-progress-bar{display:flex;align-items:center;gap:12px;padding:8px 16px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:12px;color:var(--muted);}
  .img-progress-track{flex:0 0 160px;height:6px;background:var(--bg);border-radius:3px;overflow:hidden;}
  .img-progress-fill{height:100%;width:0;background:var(--accent);transition:width .3s ease;}
  .img-progress-text{white-space:nowrap;}
  .img-progress-stop{margin-left:auto;}

  /* ── Scener (röst + bild per scen) ── */
  .scene-list{display:flex;flex-direction:column;gap:16px;margin-top:4px;}
  .scene{border:1px solid var(--border);border-radius:12px;overflow:hidden;background:var(--surface2);transition:border-color .25s,box-shadow .25s;}
  .scene.scene-active{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 18px rgba(108,143,255,.25);}
  .scene.scene-emphasis{border-color:rgba(108,143,255,.35);}
  .scene-media{position:relative;width:100%;}
  .scene-media:empty{display:none;}
  .scene-media img{width:100%;display:block;max-height:260px;object-fit:cover;}
  .scene-body{padding:14px 16px;display:flex;gap:10px;align-items:flex-start;}
  .scene.scene-emphasis .scene-body{background:rgba(108,143,255,.07);}
  .scene-play{background:var(--accent);border:none;width:26px;height:26px;border-radius:50%;color:#fff;font-size:11px;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:2px;}
  .scene-play:hover{opacity:.85;}
  .scene-text{font-size:14px;line-height:1.8;color:#b8bcd4;flex:1;}
  .scene.scene-emphasis .scene-text{color:var(--text);}
  .scene-answer{margin:0 16px 16px;width:calc(100% - 32px);}

  /* ── Scenvisualisering: statisk ämnesikon + text om ingen bild hittas (ingen animation, ingen färgad bakgrund) ── */
  .visual-placeholder{width:100%;height:180px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;text-align:center;padding:16px;background:var(--surface2);}
  .visual-placeholder .vp-icon{font-size:2.6rem;line-height:1;}
  .visual-placeholder .vp-text{color:var(--text);font-size:14px;font-weight:600;max-width:90%;}
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup">
  <div class="logo">Andvo <span>Edu</span></div>
  <div class="tagline">AI-genererad lektion för svenska skolor</div>
  <div class="card">
    <label>Ämne</label>
    <select id="subject">
      <option value="Kemi">Kemi</option>
      <option value="Biologi">Biologi</option>
      <option value="Fysik">Fysik</option>
      <option value="Matematik">Matematik</option>
    </select>

    <label>Lektionens ämne</label>
    <input type="text" id="topic" placeholder="T.ex. Jonbindning — NaCl" value="Jonbindning — jonisk och kovalent bindning"/>

    <label>Språk</label>
    <select id="language">
      <option value="sv">Svenska</option>
      <option value="en">Engelska</option>
    </select>

    <label>Elevnivå</label>
    <div class="lvl-grid">
      <div class="lvl-circle lvl-basic" id="bw" onclick="setLvl('weak')" title="Grundläggande"></div>
      <div class="lvl-circle lvl-medium selected" id="bm" onclick="setLvl('mid')" title="Medel"></div>
      <div class="lvl-circle lvl-advanced" id="bs" onclick="setLvl('strong')" title="Avancerad"></div>
    </div>

    <div class="error-box" id="errBox"></div>
    <button class="genbtn" id="genBtn" onclick="generateLesson()">Generera lektion →</button>
  </div>
</div>

<!-- LOADING -->
<div id="loading">
  <div class="spinner"></div>
  <div style="color:var(--accent);font-weight:600;">Genererar lektion...</div>
  <div class="load-steps">
    <div class="lstep" id="ls1"><div class="lstep-dot"></div>Planner: skapar lektionsplan</div>
    <div class="lstep" id="ls2"><div class="lstep-dot"></div>Writer: genererar innehåll</div>
    <div class="lstep" id="ls3"><div class="lstep-dot"></div>Checker: kontrollerar fakta</div>
    <div class="lstep" id="ls4"><div class="lstep-dot"></div>Formaterar lektion</div>
  </div>
</div>

<!-- EDITOR -->
<div id="editor">
  <div class="editor-header">
    <div>
      <div class="lesson-title" id="edTitle"></div>
      <div class="lesson-meta" id="edMeta"></div>
    </div>
    <div style="margin-left:auto;display:flex;gap:8px;flex-wrap:wrap;">
      <button class="hbtn" onclick="backToSetup()">← Ny lektion</button>
      <button class="hbtn pr" onclick="alert('Elevvy kommer snart!')">👁 Elevvy →</button>
    </div>
  </div>

  <div class="img-progress-bar" id="imgProgressBar" style="display:none;">
    <span class="img-progress-text" id="imgProgressText">Hämtar bilder...</span>
    <div class="img-progress-track"><div class="img-progress-fill" id="imgProgressFill"></div></div>
    <button class="hbtn img-progress-stop" onclick="stopImageQueue()">⏹ Stoppa</button>
  </div>

  <div id="checkBar"></div>

  <div class="editor-body">
    <div class="sidebar">
      <div class="sb-label">Lektionsblock</div>
      <div id="sideNav"></div>
    </div>
    <div class="main" id="mainContent"></div>
  </div>
</div>

<script>
let lvl = 'mid';
let lessonId = null;
let lesson = null;
let currentBlockIdx = 0;

/* ══════════════════ RÖSTUPPLÄSNING (Web Speech API) ══════════════════ */
let allVoices = [];
let isSpeaking = false;
let isPaused = false;
let voiceWordMaps = {};
let voiceTextStore = {};
let sceneData = {};
let sceneWordMaps = {};

function loadVoices() {
  allVoices = ('speechSynthesis' in window) ? speechSynthesis.getVoices() : [];
}
if ('speechSynthesis' in window) {
  loadVoices();
  speechSynthesis.onvoiceschanged = () => {
    loadVoices();
    const sel = document.getElementById(`ttsVoice${currentBlockIdx}`);
    if (sel && lesson) populateVoiceSelect(sel, lesson.language);
  };
}

// Lektionsspråket mappas till BCP-47-koder — svenska väljer alltid sv-SE-röster
function langPrefix(lang) {
  return { sv: 'sv', en: 'en' }[lang] || 'sv';
}

// Rankar röster efter kvalitet — naturliga/online-röster låter mycket bättre än robotrösterna
function pickBestVoice(lang) {
  const prefix = langPrefix(lang);
  const matches = allVoices.filter(v => v.lang.toLowerCase().startsWith(prefix));
  const pool = matches.length ? matches : allVoices;
  if (!pool.length) return null;
  const rank = v => {
    const n = v.name.toLowerCase();
    if (n.includes('natural')) return 5;
    if (v.lang.toLowerCase() === 'sv-se' && n.includes('online')) return 4;
    if (n.includes('online')) return 3;
    if (n.includes('google')) return 2;
    if (v.localService === false) return 1;
    return 0;
  };
  return pool.slice().sort((a, b) => rank(b) - rank(a))[0];
}

function populateVoiceSelect(sel, lang) {
  const prefix = langPrefix(lang);
  const matches = allVoices.filter(v => v.lang.toLowerCase().startsWith(prefix));
  const pool = matches.length ? matches : allVoices;
  if (!pool.length) { sel.innerHTML = '<option value="">(röster laddas…)</option>'; return; }
  sel.innerHTML = pool.map(v => `<option value="${v.voiceURI}">${v.name} — ${v.lang}</option>`).join('');
  const saved = localStorage.getItem('ttsVoiceURI');
  const best = pickBestVoice(lang);
  sel.value = (saved && pool.some(v => v.voiceURI === saved)) ? saved : (best ? best.voiceURI : pool[0].voiceURI);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[m]));
}

// Delar upp uppläsningstexten i ord så vi kan markera ordet som läses just nu (karaoke-stil)
function wrapVoiceText(text) {
  const map = [];
  let offset = 0;
  const html = text.split(/(\s+)/).map(tok => {
    if (tok === '' || /^\s+$/.test(tok)) { offset += tok.length; return tok; }
    const start = offset;
    offset += tok.length;
    const wid = map.length;
    map.push({ start, end: offset });
    return `<span class="tw" data-w="${wid}">${escapeHtml(tok)}</span>`;
  }).join('');
  return { html, map };
}

function buildTtsBar(idx, voiceText) {
  voiceTextStore[idx] = voiceText || '';
  if (!voiceText) { voiceWordMaps[idx] = null; return ''; }
  const { html: transcriptHtml, map } = wrapVoiceText(voiceText);
  voiceWordMaps[idx] = map;
  return `
    <div class="tts-bar">
      <button class="tts-btn" id="ttsPlay${idx}" onclick="toggleSpeak(${idx})" title="Läs upp / Pausa">▶️</button>
      <button class="tts-btn stop" onclick="stopSpeech()" title="Stoppa">⏹</button>
      <span class="tts-label">Röst</span>
      <select class="tts-select" id="ttsVoice${idx}"></select>
      <span class="tts-label">Hastighet</span>
      <input type="range" class="tts-range" id="ttsRate${idx}" min="0.6" max="1.3" step="0.05" value="1"/>
    </div>
    <details class="tts-details" open>
      <summary>🎧 Text som läses upp</summary>
      <div class="tts-transcript" id="ttsTranscript${idx}">${transcriptHtml}</div>
    </details>`;
}

function setupTtsControls(idx) {
  const sel = document.getElementById(`ttsVoice${idx}`);
  if (!sel) return;
  populateVoiceSelect(sel, lesson.language);
  sel.onchange = () => localStorage.setItem('ttsVoiceURI', sel.value);
  const rateInp = document.getElementById(`ttsRate${idx}`);
  if (rateInp) {
    rateInp.value = parseFloat(localStorage.getItem('ttsRate')) || 1;
    rateInp.oninput = () => localStorage.setItem('ttsRate', rateInp.value);
  }
}

function toggleSpeak(idx) {
  if (!('speechSynthesis' in window)) { alert('Din webbläsare stödjer tyvärr inte röstuppläsning.'); return; }
  if (isSpeaking && !isPaused) { speechSynthesis.pause(); isPaused = true; updatePlayButton(idx); return; }
  if (isSpeaking && isPaused) { speechSynthesis.resume(); isPaused = false; updatePlayButton(idx); return; }
  speakBlock(idx);
}

function speakBlock(idx) {
  speechSynthesis.cancel();
  const text = voiceTextStore[idx] || (lesson.blocks[idx] && lesson.blocks[idx].title) || '';

  const sel = document.getElementById(`ttsVoice${idx}`);
  const chosenVoice = allVoices.find(v => v.voiceURI === (sel && sel.value)) || pickBestVoice(lesson.language);
  const rateInp = document.getElementById(`ttsRate${idx}`);
  const rate = rateInp ? parseFloat(rateInp.value) : 1;

  const utter = new SpeechSynthesisUtterance(text);
  if (chosenVoice) { utter.voice = chosenVoice; utter.lang = chosenVoice.lang; }
  else utter.lang = lesson.language === 'sv' ? 'sv-SE' : langPrefix(lesson.language);
  utter.rate = rate;
  utter.pitch = 1;

  const map = voiceWordMaps[idx];
  utter.onboundary = (e) => {
    if (!map || (e.name && e.name !== 'word')) return;
    const wid = map.findIndex(w => e.charIndex >= w.start && e.charIndex < w.end);
    highlightWord(idx, wid);
  };
  utter.onend = () => { isSpeaking = false; isPaused = false; clearHighlight(idx); updatePlayButton(idx); };
  utter.onerror = () => { isSpeaking = false; isPaused = false; clearHighlight(idx); updatePlayButton(idx); };

  speechSynthesis.speak(utter);
  isSpeaking = true; isPaused = false;
  updatePlayButton(idx);
}

function stopSpeech() {
  if ('speechSynthesis' in window) speechSynthesis.cancel();
  isSpeaking = false; isPaused = false;
  clearHighlight(currentBlockIdx);
  clearActiveScene(currentBlockIdx);
  document.querySelectorAll('#mainContent .tw.tts-highlight').forEach(s => s.classList.remove('tts-highlight'));
  updatePlayButton(currentBlockIdx);
}

function updatePlayButton(idx) {
  const btn = document.getElementById(`ttsPlay${idx}`);
  if (btn) btn.textContent = (isSpeaking && !isPaused) ? '⏸' : '▶️';
}

function highlightWord(idx, wid) {
  const box = document.getElementById(`ttsTranscript${idx}`);
  if (!box) return;
  const prev = box.querySelector('.tw.tts-highlight');
  if (prev) prev.classList.remove('tts-highlight');
  if (wid < 0) return;
  const span = box.querySelector(`.tw[data-w="${wid}"]`);
  if (span) { span.classList.add('tts-highlight'); span.scrollIntoView({ block: 'nearest', behavior: 'smooth' }); }
}

function clearHighlight(idx) {
  const box = document.getElementById(`ttsTranscript${idx}`);
  const prev = box && box.querySelector('.tw.tts-highlight');
  if (prev) prev.classList.remove('tts-highlight');
}

/* ══════════════════ SCENER (röst + bild synkat per scen) ══════════════════ */
// getScenesForBlock: läser content.scenes; faller tillbaka på ett enda "scen"-objekt
// för äldre lektioner som genererades innan scen-formatet fanns.
function getScenesForBlock(b, c) {
  if (Array.isArray(c.scenes) && c.scenes.length) return c.scenes;
  const legacyText = c.voice_text || c.lead || c.instruction || '';
  if (!legacyText) return [];
  return [{ voice_text: legacyText, image: null, image_concept: b.title }];
}

function buildScenePlayer(idx, scenes, opts = {}) {
  sceneData[idx] = scenes || [];
  sceneWordMaps[idx] = [];
  if (!scenes || !scenes.length) return '';

  const scenesHtml = scenes.map((sc, si) => {
    const { html, map } = wrapVoiceText(sc.voice_text || '');
    sceneWordMaps[idx][si] = map;
    return `
    <div class="scene${sc.emphasis ? ' scene-emphasis' : ''}" id="scene${idx}_${si}">
      <div class="scene-media" id="sceneMedia${idx}_${si}">${renderSceneMediaHtml(sc, idx, si)}</div>
      <div class="scene-body">
        <button class="scene-play" onclick="playScene(${idx},${si})" title="Läs upp denna scen">▶</button>
        <div class="scene-text" id="sceneText${idx}_${si}">${html}</div>
      </div>
      ${opts.answers ? `<textarea class="tinput scene-answer" placeholder="Svar..."></textarea>` : ''}
    </div>`;
  }).join('');

  return `
    <div class="tts-bar">
      <button class="tts-btn" id="ttsPlay${idx}" onclick="toggleSceneChain(${idx})" title="Spela upp / Pausa hela blocket">▶️</button>
      <button class="tts-btn stop" onclick="stopSpeech()" title="Stoppa">⏹</button>
      <span class="tts-label">Röst</span>
      <select class="tts-select" id="ttsVoice${idx}"></select>
      <span class="tts-label">Hastighet</span>
      <input type="range" class="tts-range" id="ttsRate${idx}" min="0.6" max="1.3" step="0.05" value="1"/>
    </div>
    <div class="scene-list">${scenesHtml}</div>`;
}

function currentVoiceAndRate(idx) {
  const sel = document.getElementById(`ttsVoice${idx}`);
  const chosenVoice = allVoices.find(v => v.voiceURI === (sel && sel.value)) || pickBestVoice(lesson.language);
  const rateInp = document.getElementById(`ttsRate${idx}`);
  const rate = rateInp ? parseFloat(rateInp.value) : 1;
  return { chosenVoice, rate };
}

function makeSceneUtterance(idx, si, sc, chosenVoice, rate, onDone) {
  const utter = new SpeechSynthesisUtterance(sc.voice_text || '');
  if (chosenVoice) { utter.voice = chosenVoice; utter.lang = chosenVoice.lang; }
  else utter.lang = lesson.language === 'sv' ? 'sv-SE' : langPrefix(lesson.language);
  utter.rate = rate;
  utter.pitch = 1;
  utter.onstart = () => setActiveScene(idx, si);
  const map = sceneWordMaps[idx] && sceneWordMaps[idx][si];
  utter.onboundary = (e) => {
    if (!map || (e.name && e.name !== 'word')) return;
    const wid = map.findIndex(w => e.charIndex >= w.start && e.charIndex < w.end);
    highlightSceneWord(idx, si, wid);
  };
  utter.onend = () => { clearSceneHighlight(idx, si); if (onDone) onDone(); };
  utter.onerror = () => { clearSceneHighlight(idx, si); if (onDone) onDone(); };
  return utter;
}

function toggleSceneChain(idx) {
  if (!('speechSynthesis' in window)) { alert('Din webbläsare stödjer tyvärr inte röstuppläsning.'); return; }
  if (isSpeaking && !isPaused) { speechSynthesis.pause(); isPaused = true; updatePlayButton(idx); return; }
  if (isSpeaking && isPaused) { speechSynthesis.resume(); isPaused = false; updatePlayButton(idx); return; }
  speakAllScenes(idx);
}

function speakAllScenes(idx) {
  speechSynthesis.cancel();
  const scenes = sceneData[idx] || [];
  if (!scenes.length) return;
  const { chosenVoice, rate } = currentVoiceAndRate(idx);

  scenes.forEach((sc, si) => {
    const isLast = si === scenes.length - 1;
    const utter = makeSceneUtterance(idx, si, sc, chosenVoice, rate, () => {
      if (isLast) { isSpeaking = false; isPaused = false; clearActiveScene(idx); updatePlayButton(idx); }
    });
    speechSynthesis.speak(utter);
  });
  isSpeaking = true; isPaused = false;
  updatePlayButton(idx);
}

function playScene(idx, si) {
  speechSynthesis.cancel();
  const sc = (sceneData[idx] || [])[si];
  if (!sc) return;
  const { chosenVoice, rate } = currentVoiceAndRate(idx);
  const utter = makeSceneUtterance(idx, si, sc, chosenVoice, rate, () => {
    isSpeaking = false; isPaused = false; clearActiveScene(idx); updatePlayButton(idx);
  });
  speechSynthesis.speak(utter);
  isSpeaking = true; isPaused = false;
  updatePlayButton(idx);
}

function setActiveScene(idx, si) {
  if (currentBlockIdx !== idx) return;
  document.querySelectorAll('#mainContent .scene').forEach(el => el.classList.remove('scene-active'));
  const el = document.getElementById(`scene${idx}_${si}`);
  if (el) { el.classList.add('scene-active'); el.scrollIntoView({ block: 'center', behavior: 'smooth' }); }
}

function clearActiveScene(idx) {
  document.querySelectorAll('#mainContent .scene').forEach(el => el.classList.remove('scene-active'));
}

function highlightSceneWord(idx, si, wid) {
  const box = document.getElementById(`sceneText${idx}_${si}`);
  if (!box) return;
  const prev = box.querySelector('.tw.tts-highlight');
  if (prev) prev.classList.remove('tts-highlight');
  if (wid < 0) return;
  const span = box.querySelector(`.tw[data-w="${wid}"]`);
  if (span) span.classList.add('tts-highlight');
}

function clearSceneHighlight(idx, si) {
  const box = document.getElementById(`sceneText${idx}_${si}`);
  const prev = box && box.querySelector('.tw.tts-highlight');
  if (prev) prev.classList.remove('tts-highlight');
}

/* ══════════════════ BILDER — progressiv laddning i bakgrunden ══════════════════ */
// Lektionen visas direkt med image_search_query/image_concept redan i scen-JSON
// (skrivna av writer.js), men UTAN bilder. Klienten hämtar sedan varje scens
// bild i tur och ordning via GET /api/image/search (Google Custom Search +
// Claude Vision-relevanskontroll + DALL-E-reserv, se src/routes/image.js) —
// lektionen behöver aldrig vänta på bilder för att visas.

// Ämnesikon för platshållaren — appen omfattar bara dessa fyra vetenskapsämnen.
const SUBJECT_ICON = { Kemi: '🧪', Biologi: '🧬', Fysik: '⚛️', Matematik: '📐' };

let imgQueueTotal = 0, imgQueueDone = 0, imgQueueCancelled = false, imgAbortController = null;

// Bygger HTML för en scens media utifrån dess NUVARANDE upplösningsstatus:
// sc.image === undefined → ännu inte hämtad (skeleton), sc.image === null →
// hämtning klar men ingen bild godkändes (platshållare med image_concept),
// sc.image = {url,...} → laddad bild. Ingen animation eller färgad bakgrund
// annat än den pulserande skeletten under själva laddningen.
function renderSceneMediaHtml(sc, blockIdx, sceneIdx) {
  if (sc.image === undefined) {
    return `<div class="img-skeleton"></div>`;
  }

  const controlsId = `sceneImgCtrl${blockIdx}_${sceneIdx}`;
  const controls = `
    <div class="scene-img-controls" id="${controlsId}">
      <button class="abtn" onclick="searchNewImage(${blockIdx},${sceneIdx})">🔄 Sök ny bild</button>
      <button class="abtn" onclick="showPasteLinkInput(${blockIdx},${sceneIdx})">✏️ Klistra in länk</button>
      ${sc.image ? `<button class="abtn danger" onclick="removeSceneImage(${blockIdx},${sceneIdx})">✕ Ta bort</button>` : ''}
    </div>`;

  if (sc.image && sc.image.url) {
    const sourceLabel = sc.image.source === 'dalle' ? 'DALL-E 3' : (sc.image.source === 'manual' ? 'Egen länk' : 'Google');
    const credit = sc.image.creditLink
      ? `<div class="img-credit">${escapeHtml(sc.image.credit)} · <a href="${sc.image.creditLink}" target="_blank" rel="noopener">${sourceLabel}</a></div>`
      : (sc.image.credit ? `<div class="img-credit">${escapeHtml(sc.image.credit)}</div>` : '');
    return `<img class="img-fade-in" src="${sc.image.url}" alt="" loading="lazy"/>${credit}${controls}`;
  }

  const icon = SUBJECT_ICON[lesson.subject] || '📘';
  const text = sc.image_concept || sc.voice_text || lesson.title || '';
  return `<div class="visual-placeholder"><span class="vp-icon">${icon}</span><span class="vp-text">${escapeHtml(text)}</span></div>${controls}`;
}

// Ritar om EN scens media-yta om (och bara om) det blocket är det som visas
// just nu — annars skulle vi röra DOM-element som inte längre finns kvar.
function renderSceneMediaIfVisible(blockIdx, sceneIdx) {
  if (currentBlockIdx !== blockIdx) return;
  const media = document.getElementById(`sceneMedia${blockIdx}_${sceneIdx}`);
  if (!media) return;
  const scenes = getScenesForBlock(lesson.blocks[blockIdx], lesson.blocks[blockIdx].content || {});
  const sc = scenes[sceneIdx];
  if (!sc) return;
  media.innerHTML = renderSceneMediaHtml(sc, blockIdx, sceneIdx);
}

// Hämtar bilden för EN scen från servern och sparar resultatet direkt i
// lesson-objektet (så det finns kvar om läraren bläddrar bort och tillbaka).
async function resolveAndRenderSceneImage(blockIdx, sceneIdx, scene) {
  if (!scene.image_search_query) {
    scene.image = null;
    renderSceneMediaIfVisible(blockIdx, sceneIdx);
    return;
  }
  try {
    imgAbortController = new AbortController();
    const params = new URLSearchParams({ q: scene.image_search_query, concept: scene.image_concept || '' });
    const res = await fetch(`/api/image/search?${params.toString()}`, { signal: imgAbortController.signal });
    const data = await res.json();
    scene.image = (data && data.success && data.found) ? data.image : null;
  } catch (e) {
    if (e.name !== 'AbortError') console.warn('Bildhämtning misslyckades:', e.message);
    if (scene.image === undefined) scene.image = null;
  }
  renderSceneMediaIfVisible(blockIdx, sceneIdx);
}

// Samlar ihop alla scener i hela lektionen som ännu inte har fått en
// bildhämtning (sc.image === undefined) — video-block har inga scen-bilder
// och tas aldrig med.
function collectImageQueue() {
  const queue = [];
  lesson.blocks.forEach((b, bi) => {
    if (!['lecture', 'task', 'test'].includes(b.type)) return;
    const scenes = getScenesForBlock(b, b.content || {});
    scenes.forEach((sc, si) => {
      if (sc.image === undefined) queue.push({ blockIdx: bi, sceneIdx: si });
    });
  });
  return queue;
}

function showImageProgress() {
  const bar = document.getElementById('imgProgressBar');
  if (bar) bar.style.display = 'flex';
}

function hideImageProgress() {
  const bar = document.getElementById('imgProgressBar');
  if (bar) bar.style.display = 'none';
}

function updateImageProgress() {
  const text = document.getElementById('imgProgressText');
  const fill = document.getElementById('imgProgressFill');
  if (text) text.textContent = `Hämtar bilder... (${imgQueueDone} av ${imgQueueTotal} klara)`;
  if (fill) fill.style.width = imgQueueTotal ? `${Math.round(imgQueueDone / imgQueueTotal * 100)}%` : '0%';
}

// Stoppar kön: avbryter en eventuell pågående hämtning och hindrar nästa
// scen i kön från att starta. Redan laddade bilder behålls.
function stopImageQueue() {
  imgQueueCancelled = true;
  if (imgAbortController) imgAbortController.abort();
  hideImageProgress();
}

async function runImageQueue(queue, i) {
  if (imgQueueCancelled || i >= queue.length) { hideImageProgress(); return; }
  const { blockIdx, sceneIdx } = queue[i];
  const scenes = getScenesForBlock(lesson.blocks[blockIdx], lesson.blocks[blockIdx].content || {});
  const scene = scenes[sceneIdx];
  await resolveAndRenderSceneImage(blockIdx, sceneIdx, scene);
  imgQueueDone++;
  updateImageProgress();
  runImageQueue(queue, i + 1);
}

// Startas EN gång per genererad lektion (se renderEditor) — hämtar bilder
// sekventiellt, en scen i taget, i bakgrunden medan läraren redan kan läsa
// och bläddra i lektionen.
function startImageQueue() {
  const queue = collectImageQueue();
  imgQueueTotal = queue.length;
  imgQueueDone = 0;
  imgQueueCancelled = false;
  if (!queue.length) { hideImageProgress(); return; }
  showImageProgress();
  updateImageProgress();
  runImageQueue(queue, 0);
}

// ── Bildkontroller: sök ny bild, klistra in egen länk, ta bort ──
async function searchNewImage(blockIdx, sceneIdx) {
  const scenes = getScenesForBlock(lesson.blocks[blockIdx], lesson.blocks[blockIdx].content || {});
  const scene = scenes[sceneIdx];
  if (!scene) return;
  scene.image = undefined;
  renderSceneMediaIfVisible(blockIdx, sceneIdx);
  await resolveAndRenderSceneImage(blockIdx, sceneIdx, scene);
}

function showPasteLinkInput(blockIdx, sceneIdx) {
  const ctrl = document.getElementById(`sceneImgCtrl${blockIdx}_${sceneIdx}`);
  if (!ctrl) return;
  ctrl.innerHTML = `
    <div class="scene-img-paste">
      <input type="text" id="pasteUrl${blockIdx}_${sceneIdx}" placeholder="Klistra in bildlänk..."/>
      <button class="abtn" onclick="savePastedImage(${blockIdx},${sceneIdx})">💾 Spara</button>
      <button class="abtn" onclick="renderSceneMediaIfVisible(${blockIdx},${sceneIdx})">Avbryt</button>
    </div>`;
}

function savePastedImage(blockIdx, sceneIdx) {
  const inp = document.getElementById(`pasteUrl${blockIdx}_${sceneIdx}`);
  const url = inp ? inp.value.trim() : '';
  if (!url) return;
  const scenes = getScenesForBlock(lesson.blocks[blockIdx], lesson.blocks[blockIdx].content || {});
  const scene = scenes[sceneIdx];
  if (!scene) return;
  scene.image = { url, credit: 'Manuellt tillagd bild', creditLink: null, source: 'manual' };
  renderSceneMediaIfVisible(blockIdx, sceneIdx);
}

function removeSceneImage(blockIdx, sceneIdx) {
  const scenes = getScenesForBlock(lesson.blocks[blockIdx], lesson.blocks[blockIdx].content || {});
  const scene = scenes[sceneIdx];
  if (!scene) return;
  scene.image = null;
  renderSceneMediaIfVisible(blockIdx, sceneIdx);
}

// Hämtar bilder för alla scener i ETT block (använt efter AI-omskrivning,
// se rewriteBlock, eftersom det blocket får helt nytt scen-innehåll).
async function queueImagesForBlock(blockIdx) {
  const scenes = getScenesForBlock(lesson.blocks[blockIdx], lesson.blocks[blockIdx].content || {});
  scenes.forEach((sc, si) => {
    sc.image = undefined;
    renderSceneMediaIfVisible(blockIdx, si);
  });
  for (let si = 0; si < scenes.length; si++) {
    await resolveAndRenderSceneImage(blockIdx, si, scenes[si]);
  }
}

function setLvl(l) {
  lvl = l;
  const idFor = { weak: 'bw', mid: 'bm', strong: 'bs' };
  ['bw','bm','bs'].forEach(id => document.getElementById(id).classList.remove('selected'));
  document.getElementById(idFor[l]).classList.add('selected');
}

async function generateLesson() {
  const topic = document.getElementById('topic').value.trim();
  const subject = document.getElementById('subject').value.trim();
  const language = document.getElementById('language').value;
  const errBox = document.getElementById('errBox');

  if (!subject) { errBox.textContent = 'Skriv in ett ämne'; errBox.style.display='block'; return; }
  if (!topic) { errBox.textContent = 'Skriv in ett lektionsämne'; errBox.style.display='block'; return; }
  errBox.style.display = 'none';

  document.getElementById('setup').style.display = 'none';
  document.getElementById('loading').style.display = 'flex';

  // Animate loading steps
  const steps = ['ls1','ls2','ls3','ls4'];
  let si = 0;
  const stepTimer = setInterval(() => {
    if (si > 0) document.getElementById(steps[si-1]).className = 'lstep done';
    if (si < steps.length) { document.getElementById(steps[si]).className = 'lstep active'; si++; }
    else clearInterval(stepTimer);
  }, 2500);

  try {
    const res = await fetch('/api/lesson/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ topic, subject, level: lvl, language, duration: 60 })
    });

    clearInterval(stepTimer);
    steps.forEach(s => document.getElementById(s).className = 'lstep done');

    const data = await res.json();
    if (!data.success) throw new Error(data.error || 'Okänt fel');

    lessonId = data.lessonId;
    lesson = data.lesson;

    setTimeout(() => renderEditor(), 400);

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('setup').style.display = 'flex';
    errBox.textContent = 'Fel: ' + e.message;
    errBox.style.display = 'block';
  }
}

function renderEditor() {
  document.getElementById('loading').style.display = 'none';
  document.getElementById('editor').style.display = 'flex';

  const lvlMap = { weak:'🟢 Grundläggande', mid:'🔵 Medel', strong:'🟣 Avancerad' };
  document.getElementById('edTitle').textContent = lesson.title;
  document.getElementById('edMeta').textContent =
    `${lesson.subject} · ${lvlMap[lesson.level]} · ${lesson.duration} min · ${lesson.blocks.length} block`;

  // Check bar
  const cb = document.getElementById('checkBar');
  if (lesson.check) {
    const cls = lesson.check.status==='ok'?'check-ok':lesson.check.status==='warnings'?'check-warn':'check-err';
    const icon = lesson.check.status==='ok'?'✅':lesson.check.status==='warnings'?'⚠️':'❌';
    cb.innerHTML = `<div class="check-bar ${cls}">${icon} Faktagranskning: ${lesson.check.summary}</div>`;
  }

  buildSidebar();
  renderBlock(0);
  startImageQueue();
}

const typeIcons = { lecture:'📖', task:'✏️', video:'🎬', test:'✅' };
const typeClass = { lecture:'tl', task:'tt', video:'tv', test:'ts' };
const typeLabel = { lecture:'Lektion', task:'Uppgift', video:'Video', test:'Test' };
const badgeClass = { lecture:'bl', task:'bt', video:'bv', test:'bs' };

function buildSidebar() {
  const nav = document.getElementById('sideNav');
  nav.innerHTML = '';
  lesson.blocks.forEach((b, i) => {
    const div = document.createElement('div');
    div.className = 'sb-item' + (i===currentBlockIdx?' active':'') + (!b.visible?' hidden-block':'');
    div.id = 'sbnav' + i;
    div.onclick = () => renderBlock(i);
    div.innerHTML = `<div class="type-icon ${typeClass[b.type]}">${typeIcons[b.type]}</div>
      <span>${b.title}</span>
      ${!b.visible?'<span style="font-size:10px;margin-left:auto">dold</span>':''}`;
    nav.appendChild(div);
  });
}

function renderBlock(idx) {
  stopSpeech();
  currentBlockIdx = idx;
  document.querySelectorAll('.sb-item').forEach((el, i) => {
    el.className = 'sb-item' + (i===idx?' active':'') + (!lesson.blocks[i].visible?' hidden-block':'');
  });

  const b = lesson.blocks[idx];
  const c = b.content || {};
  const main = document.getElementById('mainContent');

  let html = `
    <div class="block-header">
      <div class="badge ${badgeClass[b.type]}">${typeLabel[b.type]}</div>
      <span style="font-size:12px;color:var(--muted)">⏱ ${b.duration} min</span>
      ${!b.visible?'<span style="font-size:12px;color:var(--red)">● Dold</span>':''}
    </div>
    <div class="block-actions">
      <button class="abtn warn" onclick="toggleBlock(${idx})">${b.visible?'👁 Dölj':'👁 Visa'}</button>
      <button class="abtn danger" onclick="deleteBlock(${idx})">🗑 Ta bort</button>
      ${idx>0?`<button class="abtn" onclick="moveBlock(${idx},-1)">↑ Flytta upp</button>`:''}
      ${idx<lesson.blocks.length-1?`<button class="abtn" onclick="moveBlock(${idx},1)">↓ Flytta ner</button>`:''}
    </div>
    <div class="block-title">${b.title}</div>`;

  let videoBlockIdx = null;

  if (b.type === 'lecture') {
    html += buildScenePlayer(idx, getScenesForBlock(b, c));
  } else if (b.type === 'task') {
    html += buildScenePlayer(idx, getScenesForBlock(b, c));
    if (c.hint) {
      html += `<div class="tbox">
        <h4>💡 Tips</h4>
        <p style="color:var(--text);font-size:13px">${c.hint}</p>
      </div>`;
    }
    html += `<textarea class="tinput" placeholder="Skriv ditt svar här..." style="margin-top:12px"></textarea>`;
  } else if (b.type === 'video') {
    const introText = (c.scenes && c.scenes[0] && c.scenes[0].voice_text) || b.description || '';
    html += buildTtsBar(idx, introText);
    html += `<div class="bcontent"><p>${introText}</p></div>
      <div class="vbox" id="videoArea${idx}"></div>`;
    videoBlockIdx = idx;
  } else if (b.type === 'test') {
    html += buildScenePlayer(idx, getScenesForBlock(b, c), { answers: true });
  }

  // AI rewrite
  html += `<div class="ai-rewrite">
    <div class="ai-rewrite-label">🤖 Be AI ändra detta block:</div>
    <div class="ai-row">
      <input class="ai-input" id="aiInp${idx}" placeholder="T.ex. 'förenkla förklaringen' eller 'lägg till ett exempel'"/>
      <button class="ai-btn" onclick="rewriteBlock(${idx})">Ändra →</button>
    </div>
  </div>`;

  // Nav
  html += `<div class="block-nav">
    ${idx>0?`<button class="nbtn" onclick="renderBlock(${idx-1})">← Föregående</button>`:''}
    ${idx<lesson.blocks.length-1?`<button class="nbtn pr" onclick="renderBlock(${idx+1})">Nästa →</button>`:''}
  </div>`;

  main.innerHTML = html;
  main.scrollTop = 0;

  setupTtsControls(idx);
  if (videoBlockIdx !== null) initVideoArea(videoBlockIdx);
}

async function toggleBlock(idx) {
  const b = lesson.blocks[idx];
  try {
    await fetch(`/api/lesson/${lessonId}/block/${b.id}/toggle`, { method:'PUT' });
    lesson.blocks[idx].visible = !lesson.blocks[idx].visible;
    buildSidebar();
    renderBlock(idx);
  } catch(e) { alert('Fel: ' + e.message); }
}

async function deleteBlock(idx) {
  if (!confirm('Ta bort detta block?')) return;
  const b = lesson.blocks[idx];
  try {
    await fetch(`/api/lesson/${lessonId}/block/${b.id}`, { method:'DELETE' });
    lesson.blocks.splice(idx, 1);
    const newIdx = Math.min(idx, lesson.blocks.length - 1);
    buildSidebar();
    if (lesson.blocks.length > 0) renderBlock(newIdx);
    else document.getElementById('mainContent').innerHTML = '<p style="color:var(--muted);padding:20px">Inga block kvar.</p>';
  } catch(e) { alert('Fel: ' + e.message); }
}

async function moveBlock(idx, dir) {
  const newIdx = idx + dir;
  if (newIdx < 0 || newIdx >= lesson.blocks.length) return;
  [lesson.blocks[idx], lesson.blocks[newIdx]] = [lesson.blocks[newIdx], lesson.blocks[idx]];
  const order = lesson.blocks.map(b => b.id);
  try {
    await fetch(`/api/lesson/${lessonId}/blocks/reorder`, {
      method:'PUT',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ order })
    });
    buildSidebar();
    renderBlock(newIdx);
  } catch(e) { alert('Fel: ' + e.message); }
}

/* ══════════════════ YOUTUBE — sökning, val och undertexter ══════════════════ */
const ytVideoState = {};
const YT_GRADE_PHRASE = { elementary: 'årskurs 4-6', middleschool: 'årskurs 7-9', highschool: 'gymnasiet' };

function defaultYoutubeQuery(block) {
  const phrase = YT_GRADE_PHRASE[lesson.gradeLevel] || 'årskurs 7-9';
  const topic = lesson.topic || lesson.title || block.title;
  const byLang = {
    sv: `${topic} förklaring svenska ${phrase}`,
    en: `${topic} explained english ${phrase}`
  };
  return byLang[lesson.language] || byLang.sv;
}

function extractYoutubeId(url) {
  if (!url) return null;
  if (/^[\w-]{11}$/.test(url)) return url;
  const m = url.match(/(?:youtu\.be\/|youtube\.com\/(?:watch\?v=|embed\/|shorts\/))([\w-]{11})/);
  return m ? m[1] : null;
}

function formatYtDuration(totalSeconds) {
  const s = Math.max(0, totalSeconds || 0);
  const m = Math.floor(s / 60);
  return `${m}:${String(s % 60).padStart(2, '0')}`;
}

function ytSubtitlePrefKey() { return `andvo_yt_sub_${lessonId}`; }
function getSubtitlePref() { return localStorage.getItem(ytSubtitlePrefKey()) || 'sv'; }
function setSubtitlePref(lang) { localStorage.setItem(ytSubtitlePrefKey(), lang); }

// Om föredraget språk är svenska men videon saknar svensk textning (enligt
// captions-info) — väljer vi engelska i stället för embed-parametern.
function effectiveSubLang(idx, requestedLang) {
  const info = ytVideoState[idx] && ytVideoState[idx].captionInfo;
  if (requestedLang === 'off') return 'off';
  if (requestedLang === 'sv' && info && info.hasSwedish === false) return 'en';
  return requestedLang;
}

function initVideoArea(idx) {
  const block = lesson.blocks[idx];
  if (!ytVideoState[idx]) {
    const existingId = extractYoutubeId(block.youtube_url);
    ytVideoState[idx] = existingId ? { status: 'embedded', videoId: existingId, captionInfo: null } : { status: 'idle' };
  }
  renderVideoAreaUI(idx);
  const st = ytVideoState[idx];
  if (st.status === 'embedded' && !st.captionInfo) loadCaptionInfo(idx);
  if (st.status === 'idle') searchVideosForBlock(idx, defaultYoutubeQuery(block));
}

function renderVideoAreaUI(idx) {
  const container = document.getElementById(`videoArea${idx}`);
  if (!container) return;
  const st = ytVideoState[idx];
  const block = lesson.blocks[idx];

  if (st.status === 'searching' || st.status === 'idle') {
    container.innerHTML = `<div style="font-size:32px">🎬</div><p style="color:var(--muted);font-size:13px">🔎 Söker videoförslag …</p>`;
    return;
  }

  if (st.status === 'embedded') {
    const requestedLang = getSubtitlePref();
    const effLang = effectiveSubLang(idx, requestedLang);
    const ccParam = effLang === 'off' ? 'cc_load_policy=0' : `cc_lang_pref=${effLang}&cc_load_policy=1`;
    const info = st.captionInfo;
    const notes = [];
    if (info) {
      if (requestedLang === 'sv' && info.hasSwedish === false) notes.push('Svensk textning ej tillgänglig — visar engelska.');
      const isAuto = effLang === 'sv' ? info.swedishIsAuto : (effLang === 'en' ? info.englishIsAuto : false);
      if (isAuto) notes.push('Automatiskt genererad textning — kan innehålla fel.');
    }
    container.innerHTML = `
      <div class="yt-embed-wrap">
        <iframe src="https://www.youtube.com/embed/${st.videoId}?${ccParam}&rel=0" title="YouTube-video" frameborder="0" allowfullscreen></iframe>
      </div>
      <div class="yt-sub-row">
        <label class="tts-label">Undertext:</label>
        <select class="tts-select" id="ytSubLang${idx}" onchange="changeSubtitleLang(${idx})">
          <option value="sv" ${requestedLang === 'sv' ? 'selected' : ''}>Svenska</option>
          <option value="en" ${requestedLang === 'en' ? 'selected' : ''}>Engelska</option>
          <option value="off" ${requestedLang === 'off' ? 'selected' : ''}>Av</option>
        </select>
        <button class="abtn" onclick="changeVideo(${idx})" style="margin-left:auto">🔁 Byt video</button>
        ${notes.length ? `<div class="yt-sub-note">⚠️ ${notes.map(escapeHtml).join(' ')}</div>` : ''}
      </div>`;
    return;
  }

  // 'results' eller 'error' — vid fel (t.ex. saknad API-nyckel) visas ingen röd
  // felruta, bara ett tips + det manuella inklistringsfältet som graceful fallback.
  const noApiKey = st.status === 'error' && st.errorCode === 'NO_API_KEY';
  const hasVideos = !noApiKey && st.videos && st.videos.length;

  const cardsHtml = hasVideos ? st.videos.map(v => `
    <div class="yt-card" onclick="chooseYoutubeVideo(${idx}, '${v.videoId}')">
      <img src="${v.thumbnail}" alt="" loading="lazy"/>
      <div class="yt-card-title">${escapeHtml(v.title)}</div>
      <div class="yt-card-meta">${escapeHtml(v.channel)} · ${formatYtDuration(v.durationSeconds)}</div>
    </div>`).join('') : '';

  container.innerHTML = `
    ${noApiKey ? `<p style="color:var(--muted);font-size:13px">🔎 Sök på YouTube efter: <em>"${escapeHtml(defaultYoutubeQuery(block))}"</em> och klistra in länken nedan.</p>` : ''}
    ${hasVideos ? `<div class="yt-cards">${cardsHtml}</div>` : ''}
    ${(!noApiKey && !hasVideos) ? '<p style="color:var(--muted);font-size:13px">Inga videoförslag hittades — prova andra sökord eller klistra in en länk.</p>' : ''}
    ${!noApiKey ? `
    <div class="yt-search-row">
      <input class="tinput" id="ytQuery${idx}" placeholder="Sökord..." value="${escapeHtml(st.query || defaultYoutubeQuery(block))}" style="min-height:auto;padding:9px;"/>
      <button class="abtn" onclick="searchVideosForBlock(${idx}, document.getElementById('ytQuery${idx}').value.trim())" style="white-space:nowrap;padding:9px 14px;">🔍 Sök igen</button>
    </div>` : ''}
    <div class="yt-row">
      <input class="tinput" id="ytUrl${idx}" placeholder="Eller klistra in YouTube-länk..." style="min-height:auto;padding:9px;"/>
      <button class="abtn" onclick="saveYoutube(${idx})" style="white-space:nowrap;padding:9px 14px;">💾 Spara länk</button>
    </div>`;
}

async function searchVideosForBlock(idx, query) {
  const block = lesson.blocks[idx];
  const q = (query || '').trim() || defaultYoutubeQuery(block);
  ytVideoState[idx] = { ...(ytVideoState[idx] || {}), status: 'searching', query: q };
  renderVideoAreaUI(idx);

  try {
    const res = await fetch(`/api/lesson/${lessonId}/block/${block.id}/youtube-search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query: q })
    });
    const data = await res.json();
    if (currentBlockIdx !== idx) return; // användaren har bytt block — avbryt
    if (!data.success) { const err = new Error(data.error || 'Okänt fel'); err.code = data.code; throw err; }
    ytVideoState[idx] = { status: 'results', videos: data.videos, query: q };
  } catch (e) {
    if (currentBlockIdx !== idx) return;
    ytVideoState[idx] = { status: 'error', videos: [], query: q, errorCode: e.code };
  }
  renderVideoAreaUI(idx);
}

function changeVideo(idx) {
  const block = lesson.blocks[idx];
  ytVideoState[idx] = { status: 'idle' };
  renderVideoAreaUI(idx);
  searchVideosForBlock(idx, defaultYoutubeQuery(block));
}

async function chooseYoutubeVideo(idx, videoId) {
  const block = lesson.blocks[idx];
  const url = `https://www.youtube.com/watch?v=${videoId}`;
  try {
    await fetch(`/api/lesson/${lessonId}/block/${block.id}/youtube`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ url })
    });
  } catch (e) { console.warn('Kunde inte spara YouTube-länk:', e.message); }

  block.youtube_url = url;
  block.content = block.content || {};
  block.content.youtube_url = url;
  ytVideoState[idx] = { status: 'embedded', videoId, captionInfo: null };
  renderVideoAreaUI(idx);
  loadCaptionInfo(idx);
}

async function loadCaptionInfo(idx) {
  const st = ytVideoState[idx];
  if (!st || st.status !== 'embedded') return;
  let info = { hasSwedish: null, hasEnglish: null, swedishIsAuto: null, englishIsAuto: null };
  try {
    const res = await fetch(`/api/lesson/youtube-captions/${st.videoId}`);
    const data = await res.json();
    const tracks = (data && data.tracks) || [];
    if (tracks.length) {
      const sv = tracks.find(t => (t.language || '').startsWith('sv'));
      const en = tracks.find(t => (t.language || '').startsWith('en'));
      info = {
        hasSwedish: !!sv,
        hasEnglish: !!en,
        swedishIsAuto: sv ? sv.trackKind === 'ASR' : null,
        englishIsAuto: en ? en.trackKind === 'ASR' : null
      };
    }
  } catch (e) { /* best-effort — behåll okänd status */ }

  if (ytVideoState[idx] !== st) return; // videon har bytts under tiden
  st.captionInfo = info;
  if (currentBlockIdx === idx) renderVideoAreaUI(idx);
}

function changeSubtitleLang(idx) {
  const sel = document.getElementById(`ytSubLang${idx}`);
  if (!sel) return;
  setSubtitlePref(sel.value);
  renderVideoAreaUI(idx);
}

async function saveYoutube(idx) {
  const inp = document.getElementById(`ytUrl${idx}`);
  const url = inp ? inp.value.trim() : '';
  if (!url) return;
  const videoId = extractYoutubeId(url);
  if (!videoId) { alert('Kunde inte tolka YouTube-länken.'); return; }
  await chooseYoutubeVideo(idx, videoId);
}

async function rewriteBlock(idx) {
  const instruction = document.getElementById(`aiInp${idx}`).value.trim();
  if (!instruction) return;
  const b = lesson.blocks[idx];
  const btn = document.querySelector(`#mainContent .ai-btn`);
  if (btn) { btn.textContent = '⏳ Vänta...'; btn.disabled = true; }

  try {
    const res = await fetch(`/api/lesson/${lessonId}/block/${b.id}/rewrite`, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ instruction })
    });
    const data = await res.json();
    if (!data.success) throw new Error(data.error);
    lesson.blocks[idx] = data.block;
    buildSidebar();
    renderBlock(idx);
    if (['lecture', 'task', 'test'].includes(data.block.type)) queueImagesForBlock(idx);
  } catch(e) {
    alert('Fel vid omskrivning: ' + e.message);
    if (btn) { btn.textContent = 'Ändra →'; btn.disabled = false; }
  }
}

function backToSetup() {
  if (!confirm('Gå tillbaka? Lektionen sparas inte permanent än.')) return;
  stopSpeech();
  document.getElementById('editor').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
  lesson = null; lessonId = null;
}
</script>
